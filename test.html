<html lang="en">
<head>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        .my-custom-hover:hover {

            display: flex;

        Hobbit 1
    </a>

    <p class="text-white mb-4 mt-8">Test 2: Tailwind Utility Class with inline transition</p>
    <a href="#" class="link-item hover:-translate-y-1.5 hover:shadow-lg active:scale-95 text-white bg-purple-500 p-4 rounded w-48" style="transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);">

        <a href="#" class="link-item undefined  my-custom-hover text-white bg-green-500" style="
display: flex;
align-items: center;
gap: 12px;
text-decoration: none;
transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);

overflow: hidden;

z-index: 10;

 margin-bottom: 0;">
